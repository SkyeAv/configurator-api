name: Release Hypatia Go Binary
on:
  push:
    branches:
      - master
permissions:
  contents: write
  packages: write
jobs:
  hypatia-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Release Linux AMD64
        uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: linux
          goarch: amd64
