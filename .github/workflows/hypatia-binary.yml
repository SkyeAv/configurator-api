name: Release Hypatia Go Binary
on:
  workflow_dispatch:
  push:
    branches:
      - master
permissions:
  contents: write
  packages: write
jobs:
  hypatia-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
      - name: Release Linux AMD64
        uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: linux
          goarch: amd64
          release_tag: latest
          overwrite: true
